<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;width:240px;margin:0;color:#1a1a1b;}
  .hdr{background:#6aaa64;color:#fff;padding:12px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
  .body{padding:12px;}
  .modes{display:flex;gap:6px;margin-bottom:10px;}
  .tab{flex:1;padding:10px;border:1px solid #d3d6da;background:#f6f7f8;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#555;}
  .tab.active{background:#6aaa64;color:#fff;border-color:#6aaa64;}
  .status{font-size:12px;color:#666;margin-bottom:10px;text-align:center;}
  .btn{width:100%;padding:10px;border:1px solid #d3d6da;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:6px;}
  .btn:hover{background:#f0f0f0;}
  .hint{font-size:11px;color:#999;line-height:1.4;margin-top:8px;}
</style>
</head>
<body>
  <div class="hdr">🟩 Wordle Solver</div>
  <div class="body">
    <div class="modes">
      <button class="tab" id="hint">💡 Hint</button>
      <button class="tab" id="solver">🤖 Solver</button>
    </div>
    <div class="status" id="status">Checking page…</div>
    <button class="btn" id="toggle">Show / hide panel</button>
    <div class="hint">Hint mode reveals one clue at a time. Solver mode suggests the statistically best word and can auto-play. Open a Wordle game to begin.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
